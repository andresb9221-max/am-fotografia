<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por tu compra</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        .mensaje {
            text-align: center;
            color: #ccc;
            margin-bottom: 30px;
        }

        .foto-compra {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 15px;
            align-items: center;
            border-bottom: 1px solid #333;
            padding: 15px 0;
        }

        .foto-compra img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
        }

        .foto-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-descargar {
            display: inline-block;
            background: white;
            color: black;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            max-width: 220px;
        }

        .estado {
            text-align: center;
            margin-top: 40px;
            color: #ccc;
        }

        .volver {
            display: block;
            margin: 35px auto 0;
            text-align: center;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Gracias por tu compra</h1>

        <p class="mensaje">
            Tus fotos en HD están listas para descargar.
        </p>

        <div id="contenedor-fotos"></div>

        <p id="estado" class="estado">
            Cargando compra...
        </p>

        <a class="volver" href="/fotos.html">
            Volver a la galería
        </a>

    </div>

    <script>

        async function cargarCompra() {

            sessionStorage.removeItem(
                "carritoFotos"
            );

            const params =
                new URLSearchParams(
                    window.location.search
                );

            const sessionId =
                params.get("session_id");

            const estado =
                document.getElementById(
                    "estado"
                );

            const contenedor =
                document.getElementById(
                    "contenedor-fotos"
                );

            if (!sessionId) {

                estado.textContent =
                    "No encontramos información de la compra.";

                return;
            }

            try {

                const respuesta =
                    await fetch(
                        `/api/compra?session_id=${sessionId}`
                    );

                const data =
                    await respuesta.json();

                if (!respuesta.ok) {

                    estado.textContent =
                        data.error ||
                        "No se pudo cargar la compra.";

                    return;
                }

                contenedor.innerHTML = "";

                data.fotos.forEach(foto => {

                    const div =
                        document.createElement(
                            "div"
                        );

                    div.className =
                        "foto-compra";

                    div.innerHTML = `
                        <img
                            src="${foto.url_thumbnail}"
                            alt="${foto.nombre_archivo}"
                        >

                        <div class="foto-info">
                            <strong>${foto.nombre_archivo}</strong>

                            <a
                                href="/api/descargar?session_id=${sessionId}&foto_id=${foto.id}"
                                class="btn-descargar"
                            >
                                Descargar HD
                            </a>
                        </div>
                    `;

                    contenedor.appendChild(
                        div
                    );
                });

                estado.textContent =
                    `Compra confirmada. Total: $${data.compra.total_mxn} MXN`;

            } catch (error) {

                console.error(error);

                estado.textContent =
                    "Error cargando la compra.";
            }
        }

        cargarCompra();

    </script>

</body>
</html>
