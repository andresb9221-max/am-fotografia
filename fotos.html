</head>


<body>
    

    
<div class="container">

    <h1>A&M FOTOGRAFÍA</h1>

    <div class="busqueda">

        <input
            id="busqueda-numero"
            type="text"
            placeholder="Búsqueda por número"
        >

        <button id="btn-buscar">
            Buscar
        </button>

    </div>

    <div class="galeria">

        <!-- Aquí se insertarán las fotos dinámicamente -->

    </div>

</div>

<div id="modal" class="modal">
        <span class="cerrar">&times;</span>
        <img id="imagen-ampliada">
</div>

<div class="paginacion">

    <button id="anterior">
        ←
    </button>

    <span id="pagina-actual">
        Página 1
    </span>

    <button id="siguiente">
        →
    </button>

</div>

<script>

    let pagina = 1;

    let paginaAnterior = 1;

    let modoBusqueda = false;

    let posicionScroll = 0;
    
        
async function cargarFotos() {

    try {

        const respuesta =
            await fetch(
                `/api/fotos?page=${pagina}`
            );

        const datos =
            await respuesta.json();

        const fotos =
            datos.fotos;

        const total =
            datos.total;

        const totalPaginas =
            Math.ceil(
                total / 20
            );

        const galeria =
            document.querySelector(
                ".galeria"
            );

        galeria.innerHTML = "";

        fotos.forEach(foto => {

            const div =
                document.createElement(
                    "div"
                );

            div.className = "foto";

            div.innerHTML = `
                <img
                    src="${foto.url_thumbnail}"
                    alt="${foto.nombre_archivo}"
                    loading="lazy"
                    class="thumbnail"
                >
            `;

            galeria.appendChild(
                div
            );
        });
        
        document.getElementById(
            "pagina-actual"
        ).textContent =
            `Página ${pagina} de ${totalPaginas}`;
            
        
        document.getElementById(
            "anterior"
        ).disabled =
            pagina === 1;

        document.getElementById(
            "siguiente"
        ).disabled =
            pagina >= totalPaginas;

    } catch (error) {

        console.error(error);
    }
      
}

cargarFotos();

async function buscarFotos() {

    const numero =
        document.getElementById(
            "busqueda-numero"
        ).value.trim();

    if (!numero) {
        return;
    }

    posicionScroll =
        window.scrollY;

    paginaAnterior =
        pagina;

    modoBusqueda = true;

    const respuesta =
        await fetch(
            `/api/buscar?numero=${numero}`
        );

    const fotos =
        await respuesta.json();

    const galeria =
        document.querySelector(
            ".galeria"
        );

    galeria.innerHTML = "";

    fotos.forEach(foto => {

        const div =
            document.createElement(
                "div"
            );

        div.className = "foto";

        div.innerHTML = `
            <img
                src="${foto.url_thumbnail}"
                alt="${foto.nombre_archivo}"
                loading="lazy"
                class="thumbnail"
            >
        `;

        galeria.appendChild(div);

    });

    document.getElementById(
        "pagina-actual"
    ).textContent =
        `${fotos.length} coincidencias`;

    document.getElementById(
        "anterior"
    ).disabled = true;

    document.getElementById(
        "siguiente"
    ).disabled = true;
}

document.getElementById(
    "siguiente"
).addEventListener(
    "click",
    () => {

        pagina++;

        cargarFotos();

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    }
);

document.getElementById(
    "anterior"
).addEventListener(
    "click",
    () => {

        if (pagina > 1) {

            pagina--;

            cargarFotos();

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }
    }
);


const modal =
    document.getElementById("modal");

const imagenAmpliada =
    document.getElementById(
        "imagen-ampliada"
    );

document.addEventListener(
    "click",
    (e) => {

        if (
            e.target.classList.contains(
                "thumbnail"
            )
        ) {

            imagenAmpliada.src =
                e.target.src;

            modal.style.display =
                "flex";
        }

    }
);

document.querySelector(
    ".cerrar"
).addEventListener(
    "click",
    () => {

        modal.style.display =
            "none";
    }
);

modal.addEventListener(
    "click",
    (e) => {

        if (e.target === modal) {

            modal.style.display =
                "none";
        }

    }
);

document.getElementById(
    "btn-buscar"
).addEventListener(
    "click",
    buscarFotos
);

document.getElementById(
    "busqueda-numero"
).addEventListener(
    "keypress",
    (e) => {

        if (e.key === "Enter") {

            buscarFotos();
        }

    }
);

document.getElementById(
    "busqueda-numero"
).addEventListener(
    "input",
    async (e) => {

        if (
            e.target.value.trim() === ""
            &&
            modoBusqueda
        ) {

            modoBusqueda = false;

            pagina =
                paginaAnterior;

            await cargarFotos();

            window.scrollTo({
                top: posicionScroll,
                behavior: "instant"
            });
        }

    }
);

</script>





</body>
</html>
