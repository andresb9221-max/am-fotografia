<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&M Fotografía</title>


<style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        min-height: 100vh;
    }

    .container {
        width: 95%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 2rem;
        letter-spacing: 2px;
    }

    .busqueda {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        position: sticky;
        top: 0;
        background: black;
        padding: 10px 0;
        z-index: 9000;
    }

    .busqueda input {
        flex: 1;
        padding: 14px;
        border: 1px solid white;
        border-radius: 6px;
        background: black;
        color: white;
        font-size: 1rem;
    }

    .busqueda button {
        padding: 14px 20px;
        border: none;
        border-radius: 6px;
        background: white;
        color: black;
        cursor: pointer;
        font-weight: bold;
    }

    .galeria {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .foto {
        background: #111;
        border-radius: 8px;
        overflow: hidden;
    }

    .foto img {
        width: 100%;
        display: block;
    }

    @media (min-width: 768px) {

        .galeria {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .modal img {
                max-height: 80vh;
        }

        .btn-descargar {
            font-size: 0.9rem;
            padding: 10px 14px;
        }

    }

    @media (min-width: 1200px) {

        .galeria {
            grid-template-columns: repeat(5, 1fr);
        }

    }
    
    .modal {
        display: none;
        position: fixed;
        z-index: 9999;
        inset: 0;
        background: rgba(0,0,0,0.95);
        justify-content: center;
        align-items: center;
    }

    .modal img {
        max-width: 95vw;
        max-height: 75vh;
        object-fit: contain;
    }

    .cerrar {
        position: absolute;
        top: 20px;
        right: 25px;
        color: white;
        font-size: 40px;
        cursor: pointer;
    }
    
    .modal-contenido {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        max-width: 95vw;
        max-height: 90vh;
    }

    .btn-descargar {
        margin-top: 12px;
        background: white;
        color: black;
        padding: 12px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        flex-shrink: 0;
    }

    .modal-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: white;
        color: black;
        border: none;
        font-size: 28px;
        padding: 10px 15px;
        border-radius: 50%;
        cursor: pointer;
    }

    .modal-prev {
        left: 15px;
    }

    .modal-next {
        right: 15px;
    }
    
    .btn-carrito {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        color: black;
        border: none;
        padding: 14px 18px;
        border-radius: 999px;
        font-weight: bold;
        cursor: pointer;
        z-index: 9998;
    }

    .panel-carrito {
        position: fixed;
        top: 0;
        right: -420px;
        width: 100%;
        max-width: 420px;
        height: 100vh;
        background: #111;
        color: white;
        z-index: 10000;
        padding: 20px;
        transition: right 0.3s ease;
        overflow-y: auto;
    }

    .panel-carrito.abierto {
        right: 0;
    }

    .carrito-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .carrito-header button {
        background: none;
        color: white;
        border: none;
        font-size: 32px;
        cursor: pointer;
    }

    .item-carrito {
        display: grid;
        grid-template-columns: 70px 1fr auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 15px;
        border-bottom: 1px solid #333;
        padding-bottom: 12px;
    }

    .item-carrito img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 6px;
    }

    .item-carrito-info {
        font-size: 0.9rem;
    }

    .item-carrito-info p {
        margin: 4px 0;
    }

    .btn-eliminar {
        background: none;
        border: none;
        color: white;
        font-size: 22px;
        cursor: pointer;
    }

    .carrito-total {
        display: flex;
        justify-content: space-between;
        margin: 20px 0;
        font-size: 1.2rem;
    }

    .btn-pagar,
    .btn-agregar-carrito {
        width: 100%;
        background: white;
        color: black;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 12px;
    }
    
    .cargando-preview {
        opacity: 0.4;
    }
    
</style>


</head>


<body>
    

    
<div class="container">

    <h1>A&M FOTOGRAFÍA</h1>

    <div class="busqueda">

        <input
            id="busqueda-numero"
            type="text"
            placeholder="Búsqueda por número"
        >

        <button id="btn-buscar">
            Buscar
        </button>

    </div>

    <div class="galeria">

        <!-- Aquí se insertarán las fotos dinámicamente -->

    </div>

</div>

<div id="modal" class="modal">

    <span class="cerrar">&times;</span>

    <button id="modal-anterior" class="modal-nav modal-prev">
        ←
    </button>

    <div class="modal-contenido">

        <img id="imagen-ampliada">

            <a
                id="btn-descargar"
                href="#"
                download
                class="btn-descargar"
            >
            Descargar original HD
        </a>
            
        <button id="btn-agregar-carrito" class="btn-agregar-carrito">
            Agregar al carrito - $60 MXN
        </button>

    </div>

    <button id="modal-siguiente" class="modal-nav modal-next">
        →
    </button>

</div>

<div id="sentinela"></div>

<p id="estado-carga" style="text-align:center; color:#aaa; margin:30px 0;">
</p>

<button id="btn-ver-carrito" class="btn-carrito">
    🛒 Carrito <span id="contador-carrito">0</span>
</button>

<div id="panel-carrito" class="panel-carrito">

    <div class="carrito-header">
        <h2>Carrito</h2>
        <button id="cerrar-carrito">×</button>
    </div>

    <div id="items-carrito"></div>

    <div class="carrito-total">
        <strong>Total:</strong>
        <span id="total-carrito">$0 MXN</span>
    </div>

    <button id="btn-pagar" class="btn-pagar">
        Pagar
    </button>

</div>


<script>

    let pagina = 1;
    
    let cargando = false;
    let hayMasFotos = true;

    let paginaAnterior = 1;

    let modoBusqueda = false;

    let posicionScroll = 0;
    
    let fotosActuales = [];
    let indiceActual = 0;
    
    let paginaAntesBusqueda = 1;
    
    const PRECIO_FOTO = 60;

    let carrito =
        JSON.parse(
            sessionStorage.getItem("carritoFotos")
        ) || [];
    
    
    function guardarCarrito() {

        sessionStorage.setItem(
            "carritoFotos",
            JSON.stringify(carrito)
        );
    }

    function actualizarCarrito() {

        const contenedor =
            document.getElementById(
                "items-carrito"
            );

        const contador =
            document.getElementById(
                "contador-carrito"
            );

        const total =
            document.getElementById(
                "total-carrito"
            );

        contenedor.innerHTML = "";
        
        if (carrito.length === 0) {

            contenedor.innerHTML = `
                <p>
                    Tu carrito está vacío
                </p>
            `;
        }

        carrito.forEach(foto => {

            const item =
                document.createElement("div");

            item.className = "item-carrito";

            item.innerHTML = `
                <img src="${foto.url_thumbnail}">

                <div class="item-carrito-info">
                    <strong>${foto.nombre_archivo}</strong>
                    <p>$${PRECIO_FOTO} MXN</p>
                </div>

                <button
                    class="btn-eliminar"
                    data-id="${foto.id}"
                >
                    🗑️
                </button>
            `;

            contenedor.appendChild(item);
        });

        contador.textContent =
            carrito.length;

        total.textContent =
            `$${carrito.length * PRECIO_FOTO} MXN`;

        guardarCarrito();
    }

    function agregarAlCarrito(foto) {

        const yaExiste =
            carrito.some(
                item => item.id === foto.id
            );

        if (yaExiste) {
            alert("Esta foto ya está en tu carrito");
            return;
        }

        carrito.push({
            id: foto.id,
            nombre_archivo: foto.nombre_archivo,
            url_thumbnail: foto.url_thumbnail,
            url_original: foto.url_original
        });

        actualizarCarrito();

        alert("Foto agregada al carrito");
    }

    function eliminarDelCarrito(id) {

        carrito =
            carrito.filter(
                foto => String(foto.id) !== String(id)
            );

        actualizarCarrito();
    }
 
 function precargarVecinas() {

     const siguiente =
         fotosActuales[indiceActual + 1];

     const anterior =
         fotosActuales[indiceActual - 1];

     if (siguiente?.url_preview) {
         const imgSig = new Image();
         imgSig.src = siguiente.url_preview;
     }

     if (anterior?.url_preview) {
         const imgAnt = new Image();
         imgAnt.src = anterior.url_preview;
     }
 }
 
 
 function abrirFoto(index) {

     indiceActual = index;

     const foto =
         fotosActuales[indiceActual];

     document.getElementById(
         "btn-agregar-carrito"
     ).onclick = () => {
         agregarAlCarrito(foto);
     };

     document.getElementById(
         "panel-carrito"
     ).classList.remove("abierto");
     
     console.log("PREVIEW:", foto.url_preview);
     console.log("ORIGINAL:", foto.url_original);

     imagenAmpliada.src =
         foto.url_preview || foto.url_thumbnail;

     document.getElementById(
         "btn-descargar"
     ).href =
         foto.url_original;

     modal.style.display =
         "flex";
 }
 
 precargarVecinas();
 
 async function cargarFotos() {

     if (cargando || !hayMasFotos || modoBusqueda) {
         return;
     }

     cargando = true;

     document.getElementById(
         "estado-carga"
     ).textContent =
         "Cargando fotos...";

     try {

         const respuesta =
             await fetch(
                 `/api/fotos?page=${pagina}`
             );

         const datos =
             await respuesta.json();

         const fotos =
             datos.fotos;

         const total =
             datos.total;

         const totalPaginas =
             Math.ceil(
                 total / 20
             );

         const galeria =
             document.querySelector(
                 ".galeria"
             );

         fotos.forEach((foto, index) => {

             const indiceGlobal =
                 fotosActuales.length;

             fotosActuales.push(foto);

             const div =
                 document.createElement(
                     "div"
                 );

             div.className = "foto";

             div.innerHTML = `
                 <img
                     src="${foto.url_thumbnail}"
                     alt="${foto.nombre_archivo}"
                     loading="lazy"
                     class="thumbnail"
                     data-index="${indiceGlobal}"
                 >
             `;

             galeria.appendChild(
                 div
             );
         });

         if (pagina >= totalPaginas) {

             hayMasFotos = false;

             document.getElementById(
                 "estado-carga"
             ).textContent =
                 "Fin de la galería";

         } else {

             pagina++;

             document.getElementById(
                 "estado-carga"
             ).textContent =
                 "";
         }

     } catch (error) {

         console.error(error);

         document.getElementById(
             "estado-carga"
         ).textContent =
             "Error cargando fotos";
     }

     cargando = false;
 }

cargarFotos();

const observer =
    new IntersectionObserver(
        (entries) => {

            if (
                entries[0].isIntersecting
            ) {

                cargarFotos();
            }
        },
        {
            root: null,
            rootMargin: "300px",
            threshold: 0
        }
    );

observer.observe(
    document.getElementById(
        "sentinela"
    )
);


const paginaGuardada =
    pagina;

async function buscarFotos() {

    const numero =
        document.getElementById(
            "busqueda-numero"
        ).value.trim();

    if (!numero) {
        return;
    }

    posicionScroll =
        window.scrollY;

    paginaAntesBusqueda =
        pagina;

    modoBusqueda = true;

    const respuesta =
        await fetch(
            `/api/buscar?numero=${numero}`
        );

    const fotos =
        await respuesta.json();
        
    fotosActuales = fotos;
    

    const galeria =
        document.querySelector(
            ".galeria"
        );

    galeria.innerHTML = "";

    fotos.forEach((foto, index) => {

        const div =
            document.createElement(
                "div"
            );

        div.className = "foto";

        div.innerHTML = `
                <img
                    src="${foto.url_thumbnail}"
                    alt="${foto.nombre_archivo}"
                    loading="lazy"
                    class="thumbnail"
                    data-index="${index}"
                >
            `;

        galeria.appendChild(div);

    });

    document.getElementById(
        "estado-carga"
    ).textContent =
        `${fotos.length} coincidencias`;
}


    



const modal =
    document.getElementById("modal");

const imagenAmpliada =
    document.getElementById(
        "imagen-ampliada"
    );


    
    
    
    document.addEventListener(
        "click",
        (e) => {

            if (
                e.target.classList.contains(
                    "thumbnail"
                )
            ) {

                const index =
                    parseInt(
                        e.target.dataset.index
                    );

                abrirFoto(index);
            }

        }
    );

    
    document.getElementById(
        "modal-siguiente"
    ).addEventListener(
        "click",
        (e) => {

            e.stopPropagation();

            if (
                indiceActual <
                fotosActuales.length - 1
            ) {

                abrirFoto(
                    indiceActual + 1
                );
            }
        }
    );

    document.getElementById(
        "modal-anterior"
    ).addEventListener(
        "click",
        (e) => {

            e.stopPropagation();

            if (
                indiceActual > 0
            ) {

                abrirFoto(
                    indiceActual - 1
                );
            }
        }
    );
    
document.querySelector(
    ".cerrar"
).addEventListener(
    "click",
    () => {

        modal.style.display =
            "none";
    }
);

modal.addEventListener(
    "click",
    (e) => {

        if (e.target === modal) {

            modal.style.display =
                "none";
        }

    }
);

document.getElementById(
    "btn-buscar"
).addEventListener(
    "click",
    buscarFotos
);

document.getElementById(
    "busqueda-numero"
).addEventListener(
    "keypress",
    (e) => {

        if (e.key === "Enter") {

            buscarFotos();
        }

    }
);

document.getElementById(
    "busqueda-numero"
).addEventListener(
    "input",
    async (e) => {

        if (
            e.target.value.trim() === ""
            &&
            modoBusqueda
        ) {

            modoBusqueda = false;
            
            const paginasACargar =
                paginaAntesBusqueda;

            pagina = 1;
            hayMasFotos = true;
            cargando = false;
            fotosActuales = [];
            
            document.querySelector(
                ".galeria"
            ).innerHTML = "";
            
            
            for (let i = 1; i <= paginasACargar; i++) {
                await cargarFotos();
            }
            
            window.scrollTo({
                top: posicionScroll,
                behavior: "instant"
            });

        }

    }
);

document.addEventListener(
    "keydown",
    (e) => {

        if (
            modal.style.display !== "flex"
        ) {
            return;
        }

        if (e.key === "ArrowRight") {

            if (
                indiceActual <
                fotosActuales.length - 1
            ) {

                abrirFoto(
                    indiceActual + 1
                );
            }
        }

        if (e.key === "ArrowLeft") {

            if (
                indiceActual > 0
            ) {

                abrirFoto(
                    indiceActual - 1
                );
            }
        }

        if (e.key === "Escape") {

            modal.style.display =
                "none";
        }

    }
);

document.getElementById(
    "btn-ver-carrito"
).addEventListener(
    "click",
    () => {

        document.getElementById(
            "panel-carrito"
        ).classList.add("abierto");
    }
);

document.getElementById(
    "cerrar-carrito"
).addEventListener(
    "click",
    () => {

        document.getElementById(
            "panel-carrito"
        ).classList.remove("abierto");
    }
);

document.getElementById(
    "items-carrito"
).addEventListener(
    "click",
    (e) => {

        if (
            e.target.classList.contains(
                "btn-eliminar"
            )
        ) {

            eliminarDelCarrito(
                e.target.dataset.id
            );
        }
    }
);

document.getElementById(
    "btn-pagar"
).addEventListener(
    "click",
    async () => {

        if (carrito.length === 0) {
            alert("Tu carrito está vacío");
            return;
        }

        const respuesta =
            await fetch(
                "/api/crear-checkout",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({
                        carrito
                    })
                }
            );

        const data =
            await respuesta.json();

        if (data.url) {

            window.location.href =
                data.url;

        } else {

            alert(
                "No se pudo iniciar el pago"
            );
        }
    }
);

actualizarCarrito();

</script>





</body>
</html>
