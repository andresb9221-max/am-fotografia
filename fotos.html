```
<style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        min-height: 100vh;
    }

    .container {
        width: 95%;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 2rem;
        letter-spacing: 2px;
    }

    .busqueda {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
    }

    .busqueda input {
        flex: 1;
        padding: 14px;
        border: 1px solid white;
        border-radius: 6px;
        background: black;
        color: white;
        font-size: 1rem;
    }

    .busqueda button {
        padding: 14px 20px;
        border: none;
        border-radius: 6px;
        background: white;
        color: black;
        cursor: pointer;
        font-weight: bold;
    }

    .galeria {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .foto {
        background: #111;
        border-radius: 8px;
        overflow: hidden;
    }

    .foto img {
        width: 100%;
        display: block;
    }

    .paginacion {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 30px;
        flex-wrap: wrap;
    }

    .paginacion button {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: white;
        color: black;
    }

    @media (min-width: 768px) {

        .galeria {
            grid-template-columns: repeat(4, 1fr);
        }

    }

    @media (min-width: 1200px) {

        .galeria {
            grid-template-columns: repeat(5, 1fr);
        }

    }

</style>
```

</head>

<script>

async function cargarFotos() {

    try {

        const respuesta = await fetch(
            "/api/fotos"
        );

        const fotos = await respuesta.json();

        const galeria =
            document.querySelector(
                ".galeria"
            );

        galeria.innerHTML = "";

        fotos.forEach(foto => {

            const div =
                document.createElement(
                    "div"
                );

            div.className = "foto";

            div.innerHTML = `
                <img
                    src="${foto.url_thumbnail}"
                    alt="${foto.nombre_archivo}"
                    loading="lazy"
                >
            `;

            galeria.appendChild(
                div
            );
        });

    } catch (error) {

        console.error(error);
    }
}

cargarFotos();

</script>


<body>
